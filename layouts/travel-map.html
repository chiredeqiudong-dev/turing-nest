{{ partial "head.html" . }}

<article class="post {{ .Site.Language.LanguageName }}" id="article">
  <div class="row">
    <div class="col-xs-12">
      <div class="site-header">{{ partial "header.html" . }}</div>
      <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
      </header>
      <div class="post-content markdown-body">
        {{ .Content }}
        <div id="travel-map" style="width: 100%; height: 80vh; min-height: 500px; margin-top: 30px;">
        </div>
        {{ partial "travelmap.html" . }}
      </div>
      {{ partial "footer.html" . }}
    </div>
  </div>
</article>

{{ partial "scripts.html" . }}
