# 部署的时候还需要注意 Cloudflare 使用的 Hugo 版本（尽可能一致）
baseURL = 'https://blog.turingzy.cn'
languageCode = 'en-us'
title = 'TuringNest'
theme = 'yinyang'
license = "MIT"
tags = [
  "blog",
  "minimal",
  "simple",
  "clean",
  "personal"
]

[permalinks]
  posts = "/posts/:slug/"
[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          # block = [['$', '$'],['$$','$$']]
          inline = [['$', '$']]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = true #使用行内样式
    lineNumbersInTable = false
    lineNoStart = 0
    lineNos = true
    style = "monokai"
    tabWidth = 4

[outputs]
  home = ["html","rss"]
  section = ["html"]
  taxonomy = ["html"]
  term = ["html"]

[params]
  mainSections = ["posts"]
  headTitle = "Yang Zhang"
  description = "「I came, I saw, I conquered」"
  lazyImage = true
  math = true
  siteStartDate = "2025-06-01"
  # google tag.js
  extraHead = '<script async src="https://www.googletagmanager.com/gtag/js?id=G-66JHC5XMXL"></script>'
  # gisus
  giscus = true
  giscus_repo = "turingzy-dev/blog-giscus"
  giscus_repo_id = "R_kgDOPTLcow"
  giscus_category = "Announcements"
  giscus_category_id = "DIC_kwDOPTLco84Ctb-O"
[params.author]
  name = "Zhang Yang"
  email = 'email@turingzy.cn'
  homepage = "/about/"
