<script>
document.addEventListener('DOMContentLoaded', function() {
  var toc = document.querySelector('.toc');
  var toggle = document.querySelector('.toc-toggle');
  
  if (toc && toggle) {
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      toc.classList.toggle('expanded');
    });
  }

  var tocLinks = document.querySelectorAll('.toc a');
  if (tocLinks.length > 0) {
    var headings = [];
    tocLinks.forEach(function(link) {
      var id = link.getAttribute('href').replace('#', '');
      var heading = document.getElementById(id);
      if (heading) {
        headings.push({ id: id, element: heading });
      }
    });

    if (headings.length > 0) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            tocLinks.forEach(function(l) { l.classList.remove('active'); });
            var activeLink = document.querySelector('.toc a[href="#' + entry.target.id + '"]');
            if (activeLink) {
              activeLink.classList.add('active');
            }
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });

      headings.forEach(function(h) {
        observer.observe(h.element);
      });
    }
  }
});

function goBackOrHome() {
  if (history.length > 1) {
    history.back();
  } else {
    window.location.href = '/';
  }
}

// Image lightbox functionality
document.addEventListener('DOMContentLoaded', function() {
  // Create modal
  const modal = document.createElement('div');
  modal.className = 'image-modal';
  modal.innerHTML = `
    <div class="image-modal-content">
      <img class="image-modal-img" src="" alt="">
      <div class="image-modal-controls">
        <span class="zoom-percentage" id="zoomPercent">100%</span>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  let currentZoom = 100;
  let originalWidth, originalHeight;
  const modalImg = modal.querySelector('.image-modal-img');
  const zoomPercentEl = modal.querySelector('#zoomPercent');

  function updateZoom() {
    const width = (originalWidth * currentZoom) / 100;
    const height = (originalHeight * currentZoom) / 100;
    modalImg.style.width = width + 'px';
    modalImg.style.height = height + 'px';
    zoomPercentEl.textContent = currentZoom + '%';
  }

  function zoom(delta) {
    currentZoom = Math.max(20, Math.min(300, currentZoom + delta));
    updateZoom();
  }

  const images = document.querySelectorAll('.post-content img');
  images.forEach(img => {
    img.addEventListener('click', function() {
      modalImg.src = this.src;
      
      // Get original dimensions
      const tempImg = new Image();
      tempImg.onload = function() {
        originalWidth = this.naturalWidth;
        originalHeight = this.naturalHeight;
        currentZoom = 100;
        updateZoom();
      };
      tempImg.src = this.src;
      
      modal.classList.add('active');
    });
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      modal.classList.remove('active');
    }
  });

  // Keyboard and mouse wheel controls
  document.addEventListener('keydown', function(e) {
    if (!modal.classList.contains('active')) return;
    
    if (e.key === 'Escape') {
      modal.classList.remove('active');
    }
  });

  // Mouse wheel zoom
  modal.addEventListener('wheel', function(e) {
    if (!modal.classList.contains('active')) return;
    e.preventDefault();
    
    const delta = e.deltaY > 0 ? -10 : 10;
    zoom(delta);
  }, { passive: false });
});
</script>
