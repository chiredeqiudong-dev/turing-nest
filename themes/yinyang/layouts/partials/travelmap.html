
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />

<style>
  .leaflet-tooltip {
    background: transparent;
    border: none;
    box-shadow: none;
    color: #22c55e;
    font-weight: bold;
    font-size: 12px;
    padding: 0;
  }
  
  .leaflet-tooltip-top::before,
  .leaflet-tooltip-bottom::before,
  .leaflet-tooltip-left::before,
  .leaflet-tooltip-right::before {
    border: none;
  }

  .leaflet-control-zoom {
    border: none !important;
    box-shadow: none !important;
    background: none !important;
    margin-bottom: 5px !important;
  }

  .leaflet-control-zoom a {
    width: 32px !important;
    height: 32px !important;
    line-height: 32px !important;
    font-size: 16px !important;
    background-color: white !important;
    border: 2px solid #ccc !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: #666 !important;
    text-decoration: none !important;
    transition: all 0.3s ease !important;
    margin: 0 !important;
    padding: 0 !important;
    margin-bottom: 5px !important;
  }

  .leaflet-control-zoom a:last-child {
    margin-bottom: 0 !important;
  }

  .leaflet-control-zoom a:hover {
    background-color: #f0f0f0 !important;
    border-color: #999 !important;
  }

  .home-button {
    background-color: white;
    border: 2px solid #ccc;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s ease;
    text-decoration: none;
    margin: 0 0 5px 0;
    color: #666;
  }

  .home-button:hover {
    background-color: #f0f0f0;
    border-color: #999;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script type="text/javascript">

document.addEventListener("DOMContentLoaded", function() {
    var chinaLatLngs = [
        [53.56, 73.50],
        [18.20, 135.09]
    ];
    var chinaBounds = L.latLngBounds(chinaLatLngs);

    var map = L.map('travel-map', {
        maxBounds: chinaBounds,
        maxBoundsViscosity: 1.0,
        minZoom: 4,
        maxZoom: 15,
        dragging: true,
        touchZoom: true,
        scrollWheelZoom: true,
        doubleClickZoom: true,
        keyboard: false,
        zoomControl: false
    });

    var initialView = {
        center: [35, 105],
        zoom: 4
    };

    map.setView(initialView.center, initialView.zoom);
    
    map.on('dragend', function() {
        map.panInsideBounds(chinaBounds, { animate: false });
    });

    var HomeControl = L.Control.extend({
        options: {
            position: 'topleft'
        },

        onAdd: function(map) {
            var container = L.DomUtil.create('div', 'home-button');
            container.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>';
            container.title = '回到初始位置';

            L.DomEvent.on(container, 'click', function() {
                map.setView(initialView.center, initialView.zoom);
            });

            return container;
        }
    });

    map.addControl(new HomeControl());
    L.control.zoom({ position: 'topleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        maxZoom: 19
    }).addTo(map);

    // 直接添加标记，不使用聚类
    var markerGroup = L.featureGroup();

    var spots = {{ index .Site.Data "travel-spots" | default (slice) | jsonify }};

    if (typeof spots === 'string') {
        try {
            spots = JSON.parse(spots);
        } catch(e) {
            return;
        }
    }

    if (!spots || spots.length === 0) {
        return;
    }

    if (spots.length === 0) {
        return;
    }

    spots.forEach(function(spot) {
        if (!spot.lat || !spot.lon || isNaN(spot.lat) || isNaN(spot.lon)) {
            return;
        }

        var marker = L.circleMarker([spot.lat, spot.lon], {
            radius: 4,
            fillColor: "#22c55e",
            color: "#22c55e",
            weight: 3,
            opacity: 1,
            fillOpacity: 1
        });

        marker.bindTooltip(spot.name, {
            permanent: false,
            direction: 'top',
            offset: L.point(0, -10),
            className: ''
        });
        
        markerGroup.addLayer(marker);
    });

    map.addLayer(markerGroup);
    
    if (markerGroup.getLayers().length > 0) {
        var bounds = markerGroup.getBounds().pad(0.1);
        bounds = bounds.intersect(chinaBounds);
        if (bounds.isValid()) {
            map.fitBounds(bounds);
        }
    }
    
    map.panInsideBounds(chinaBounds, { animate: false });
});
</script>
